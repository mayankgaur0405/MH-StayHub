name: mh_stayhub
description: "MH StayHub Student Accommodation App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management & Dependency Injection
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.0.0

  # Networking
  dio: ^5.4.3
  
  # Local Storage & Caching
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  
  # UI & Styling
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10
  url_launcher: ^6.2.6
  shimmer: ^3.0.0
  
  # Utilities
  intl: ^0.19.0
  logger: ^2.0.2
  flutter_dotenv: ^5.1.0
  firebase_core: ^4.10.0
  firebase_analytics: ^12.4.2
  firebase_crashlytics: ^5.2.3
  geolocator: ^14.0.2
  razorpay_flutter: ^1.4.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env.development
    - .env.staging
    - .env.production
